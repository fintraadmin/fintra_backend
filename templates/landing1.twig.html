    <!-- Footer with Links -->
	 <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>Quick Links</h3>
                <ul>
                    <li><a href="{{tracking_url}}" target="_blank">Application Status</a></li>
                </ul>
            </div>
        </div>
    </footer>

<script>
        // Card details toggle
        document.querySelectorAll('.btn-details').forEach(button => {
            button.addEventListener('click', () => {
                const details = button.closest('.card-content')
                    .querySelector('.feature-details');
                details.classList.toggle('hidden');
                button.textContent = details.classList.contains('hidden') 
                    ? 'View Details' 
                    : 'Hide Details';
            });
        });

        // Mobile menu toggle
        const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
        const navLinks = document.querySelector('.nav-links');

        mobileMenuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('show');
            const spans = mobileMenuBtn.querySelectorAll('span');
            spans.forEach((span, index) => {
                if (navLinks.classList.contains('show')) {
                    switch(index) {
                        case 0:
                            span.style.transform = 'rotate(45deg)';
                            break;
                        case 1:
                            span.style.opacity = '0';
                            break;
                        case 2:
                            span.style.transform = 'rotate(-45deg)';
                            break;
                    }
                } else {
                    span.style = '';
                }
            });
        });

        // Close mobile menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.nav-container')) {
                navLinks.classList.remove('show');
                mobileMenuBtn.querySelectorAll('span').forEach(span => {
                    span.style = '';
                });
            }
        });
    </script>
