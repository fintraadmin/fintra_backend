<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saving Account Application</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background-color: #007BFF;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .header .logo {
            font-size: 1.5em;
            font-weight: bold;
        }

        .heading {
            text-align: center;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .card-description {
            font-size: 1em;
            color: #555;
            margin-bottom: 15px;
        }

        .apply-btn {
            background-color: #007BFF;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .apply-btn:hover {
            background-color: #0056b3;
        }

        .footer {
            background-color: #f1f1f1;
            text-align: center;
            padding: 20px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer-links a {
            text-decoration: none;
            color: #555;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #007BFF;
        }
    </style>
</head>
<body>
    <!-- Header with Logo -->
    <header class="header">
        <div class="logo">FindiPay</div>
    </header>
    
    <!-- Main Content -->
    <div class="container">
        <div class="heading">Choose Your Savings Account</div>
        <!-- <div >*commission only applicable on new to bank customers </div>-->

            <div class="card">

                <div class="card-title"><img src="https://myaccount.indusind.com/savingsaccount/Image_banners/121_Desktop_Desktop.jpg"></div>
                <button class="apply-btn" onclick="window.location.href='{{a_link}}'">Apply Now</button>
                <div class="card-description">
		</div>
            </div>
