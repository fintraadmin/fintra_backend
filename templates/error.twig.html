<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found (404)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .header {
            background-color: #007BFF;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .header .logo {
            font-size: 1.5em;
            font-weight: bold;
        }

        .error-message {
            margin-top: 50px;
            font-size: 2em;
            color: #555;
        }

        .back-link {
            margin-top: 30px;
            font-size: 1.5em;
            color: #007BFF;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #0056b3;
        }

        .footer {
            background-color: #f1f1f1;
            text-align: center;
            padding: 20px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer-links a {
            text-decoration: none;
            color: #555;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #007BFF;
        }
    </style>
</head>
<body>
    <!-- Header with Logo -->
    <header class="header">
        <div class="logo">Findipay</div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="error-message">
            Oops! Something went wrong.Make sure you landed from right link.
        </div>
    </div>
    
    <!-- Footer with Links -->
    <footer class="footer">
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Contact Us</a>
        </div>
    </footer>
</body>
</html>
