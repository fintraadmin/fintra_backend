
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Generate Links {{cid}}</h2>
        <input type="text" id="salesId" placeholder="Enter Unique sales ID" required="true">
        {% for link in links %}
            <button onclick="generateLink('{{ link.link }}');return false;">{{ link.label }}</button>
        {% endfor %}
    </div>

    <script>
        function generateLink(link) {
            const salesId = document.getElementById('salesId').value.trim();
            if (!salesId) {
                alert('Please enter a valid sales ID');
                return;
            }
            
            const url = `${link}&aid=${encodeURIComponent(salesId)}`;
            window.location.href = url;
        }
    </script>
</body>
</html>
