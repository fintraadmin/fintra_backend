<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Information Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background-color: #007BFF;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .header .logo {
            font-size: 1.5em;
            font-weight: bold;
        }

        .heading {
            text-align: center;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .form-container {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
        }

        .form-field {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .form-label {
            font-size: 1em;
            margin-bottom: 5px;
            display: block;
        }

        .submit-btn {
            background-color: #007BFF;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }

        .footer {
            background-color: #f1f1f1;
            text-align: center;
            padding: 20px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer-links a {
            text-decoration: none;
            color: #555;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #007BFF;
        }
    </style>
    <script>
	 function validateForm() {
	    console.log('Validating form');
            var name = document.getElementById("name").value;
            var phone = document.getElementById("phone").value;
            var email = document.getElementById("email").value;
            var pincode = document.getElementById("pincode").value;

            if (!name) {
                alert("Name is required.");
                return false;
            }

            if (phone && !/^\d{10}$/.test(phone)) {
                alert("Please enter a valid 10-digit phone number.");
                return false;
            }

            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                alert("Please enter a valid email address.");
                return false;
            }

            if (pincode && !/^\d{6}$/.test(pincode)) {
                alert("Please enter a valid 6-digit pincode.");
                return false;
            }
	    console.log("redirecting");
            // Redirect to a URL if form is valid
            window.location.href = "{{redirectURL|raw}}"+ '&name=' + name + '&phone=' + phone + '&pincode=' + pincode + '&email='+email ;
            return false;
        }
    </script>
</head>
<body>
    <!-- Header with Logo -->
    <header class="header">
        <div class="logo">FindiBankit</div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="heading">Enter Customer Information</div>
        
        <div class="form-container">
            <form onsubmit="return validateForm()">
                <label class="form-label" for="name">Name (required)</label>
                <input class="form-field" type="text" id="name" name="name" required>
                
                <label class="form-label" for="phone">Phone Number</label>
                <input class="form-field" type="text" id="phone" name="phone">
                
                <label class="form-label" for="email">Email</label>
                <input class="form-field" type="email" id="email" name="email">
                
                <label class="form-label" for="pincode">Pincode</label>
                <input class="form-field" type="text" id="pincode" name="pincode">
                
                <button class="submit-btn" type="submit">Submit</button>
            </form>
        </div>
    </div>
    
    <!-- Footer with Links -->
    <footer class="footer">
	<!--
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Contact Us</a>
        </div>
		-->
    </footer>
</body>
</html>
