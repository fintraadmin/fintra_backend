<!DOCTYPE html>
<html class="no-js"> <!--<![endif]-->
    <head>
	{% block head %}
        <meta charset="utf-8">
        <title>{% block title %} {{title}} {% endblock %}</title>
        <meta name="description" content="{{page_description}}">
	<meta name="keywords" content="{{keywords}}">
        <meta property="og:image" content="/img/log_web.png">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta http-equiv="Cache-control" content="public">
        <link async href="css/flexslider.min.css" rel="stylesheet" type="text/css" media="all"/>
        <link async href="css/line-icons.min.css" rel="stylesheet" type="text/css" media="all"/>
        <link async href="css/elegant-icons.min.css" rel="stylesheet" type="text/css" media="all"/>
        <link async href="css/lightbox.min.css" rel="stylesheet" type="text/css" media="all"/>
        <link async href="css/bootstrap.min.css" rel="stylesheet" type="text/css" media="all"/>
        <link async href="css/theme-1.min.css" rel="stylesheet" type="text/css" media="all"/>
        <link async href="css/custom.css" rel="stylesheet" type="text/css" media="all"/>
        <link async href="css/fonts.1.min.css" rel="stylesheet" type="text/css" media="all"/>
        <!--[if gte IE 9]>
                <link rel="stylesheet" type="text/css" href="css/ie9.css" />
                <![endif]-->
        <script async src="js/modernizr-2.6.2-respond-1.1.0.min.js"></script>
    </head>

<div class="nav-container">
 <nav class="centered-logo top-bar">
    <div class="container">
    	<div class="row">
    		<div class="col-sm-12 text-center">
    			<a href="#">
    			<img class="logo logo-dark" alt="Logo" src="img/logo_web.png">
    		</div>
    	</div>
    
    	<div class="row nav-menu">
    		<div class="col-sm-12 columns text-center">
    			<ul class="menu">
				<a></a>
    				{% for item in navigation %}
    				 <li><a href="{{ item.href }}" target="_self">{{ item.caption }}</a></li>
    				{% endfor %}
    			</ul>
    		</div>
    	</div>
    	
    	<div class="mobile-toggle">
    		<i class="icon icon_menu"></i>
    	</div>
    	
    </div>
    <div class="bottom-border"></div>
 </nav>
</div>		

<div class="main-container">
			<section class="feature-divider">
			
			
				<div class="container">
					<div class="row">
						<div class="col-sm-5">
							<h1>{{introduction}}</h1>
							<p class="lead"> {{details}} </p>
							<a class="store-link" href="{{applink}}"><img alt="Download from Play Store" src="/img/google-play.png"></a>
						</div>
					
						<div class="col-sm-7" data-scroll-reveal="enter from bottom and move 100px">
							<img alt="App Screenshot" src="img/app2.png">
						</div>
					</div>
				</div>
			</section>
</div>

<div class="footer-container">
			<footer class="social bg-secondary-1">
				<div class="container">
					<div class="row">
						<div class="col-sm-12 text-center">
							<h1 class="text-white">Feel free to contact us</h1>
							<a href="#" class="text-white"><strong>contact@fintra.co.in</strong></a><br>
							<ul class="social-icons">
								<li>
									<a href="#">
										<i class="icon social_twitter"></i>
									</a>
								</li>
								
								<li>

									</a>
								</li>
								
								<li>

									</a>
								</li>
								
								<li>

									</a>
								</li>
								
								<li>
									<a href="#">
										<i class="icon social_tumblr"></i>
									</a>
								</li>
								
								<li>
									<a href="#">
										<i class="icon social_pinterest"></i>
									</a>
								</li>
							</ul><br>
							<span class="sub">© Copright 2017 Fintra Financial Services. All Rights Reserved. </span>
						</div>
					</div>
				</div>
			</footer>
		</div>
		<script src="https://www.youtube.com/iframe_api"></script>
		<script  src="js/jquery.min.js"></script>
        <script  src="js/jquery.plugin.min.js"></script>
        <script async src="js/bootstrap.min.js"></script>
        <script async src="js/jquery.flexslider-min.js"></script>

        <script async src="js/jquery.countdown.min.js"></script>

</html>
